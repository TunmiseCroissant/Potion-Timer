<!DOCTYPE html>
<html>
    <head>
        <title>Potion Timer</title>
        <link rel = "stylesheet" href="./style.css">
    </head>
    <body>
        <div id = "canvas">
        <canvas id="canvas3d" width="400" height="400"></canvas>
        </div>
         <div id = "main">
            <div id = "options">
                <p id = "TimeView">No timer set</p>
                <button id = "startButton" class = "inactive">Start</button>
                <button id = "pauseButton" class = "active">Pause</button>
                <button id = "abortButton" class = "active">Cancel</button>
            </div>
         </div>
        <dialog id = "dialogBox" class = "dialogs">
            <section class = "background" id = "dialogBackground">
                <div class = "tab" id = "dialogTab">
                    <p class = "title">Set Timer</p>
                    <p class = "X">X</p>
                </div>
                <section id = "dialogMain">
                    <section id = "dialog">
                        <section id = "hours">
                        <div class = "number">
                            <p class = "up-arrow">▲</p>
                            <input text = "text" readonly value = 0 disabled>
                            <p class = "down-arrow">▼</p>
                        </div>
                        </section>
                        <p>:</p>
                        <section id = "minutes">
                        <div class = "number">
                            <p class = "up-arrow">▲</p>
                            <input text = "text" readonly value = 0 disabled>
                            <p class = "down-arrow">▼</p>
                        </div>
                        <div class = "number">
                            <p class = "up-arrow">▲</p>
                            <input text = "text" readonly value = 0 disabled>
                            <p class = "down-arrow">▼</p>
                        </div>
                        </section>
                        <p>:</p>
                        <section id = "seconds">
                            <div class = "number">
                            <p class = "up-arrow">▲</p>
                            <input text = "text" readonly value = 0 disabled>
                            <p class = "down-arrow">▼</p>
                        </div>
                        <div class = "number">
                            <p class = "up-arrow">▲</p>
                            <input text = "text" readonly value = 0 disabled>
                            <p class = "down-arrow">▼</p>
                        </div>
                        </section>
                    </section>
                    <div id = "confirm">Confirm</div>
                </section>
            </section>
        </dialog>
        <dialog class = "dialogs" id = "completedDialog">
            <p>Time completed!</p>
            <p>Elapsed time :</p>
            <p>Total tokens : </p>
            <div id = "endButton">confirm</div>
        </dialog>
        <script type = "module" src = "./main.js"></script>
        <script type = "module" src = "./music.js"></script>
    </body>
</html>
